name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    uses: ./.github/workflows/build.yml

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        id: download
        with:
          name: procon2-driver

      - name: Rename binary with tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          mv procon2-driver "procon2-driver-$TAG_NAME"
          echo "NEW_FILENAME=procon2-driver-$TAG_NAME" >> $GITHUB_ENV

      - name: Create release body
        id: create_body
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs');


            const lines = fs.readFileSync('./CHANGELOG.md', 'utf8').split("\n")
            let changelog = ""
            for (let line of lines) {
                if (line == "___") break
                changelog+=line + "\n"
            }
            return changelog
          result-encoding: string

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.create_body.outputs.result }}
          files: ${{ env.NEW_FILENAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
